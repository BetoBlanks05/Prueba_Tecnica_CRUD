services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=crud
      - DB_USERNAME=root
      - DB_PASSWORD=200999
    volumes:
      - .:/var/www/html:delegated
    ports:
      - "80:80"
    depends_on:
      - mysql
    networks:
      - crud-network

  mysql:
    image: mysql:8.1
    container_name: crud_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: crud
      MYSQL_ROOT_PASSWORD: 200999
      MYSQL_PASSWORD: 200999
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - crud-network

volumes:
  dbdata:
    driver: local

networks:
  crud-network:
    driver: bridge
